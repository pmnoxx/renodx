# Build and publish only the _univ and _autohdr (HDR upgrade) addons to a dedicated release.
name: addons-univ-hdr

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'
  push:
    branches: [main]
    paths:
      - 'src/games/_univ/**'
      - 'src/games/_autohdr/**'
      - 'src/mods/**'
      - 'src/utils/**'
      - 'src/shaders/**'
      - 'CMakeLists.txt'
      - 'external/reshade/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Slang binaries
        run: |
          curl -L -o slang.zip https://github.com/shader-slang/slang/releases/download/v2025.10.3/slang-2025.10.3-windows-x86_64.zip
          powershell -Command "Expand-Archive -Path slang.zip -DestinationPath slang_temp -Force; if (!(Test-Path -Path .\bin)) { New-Item -ItemType Directory -Path .\bin }; Copy-Item slang_temp\bin\* .\bin -Force; Remove-Item slang_temp -Recurse -Force"

      - name: Set up Clang (x64)
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest
          platform: x64

      - name: Install ninja-build tool
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure build for amd64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure CMake (x64)
        run: cmake --preset clang-x64

      - name: Build _univ and _autohdr (x64)
        run: cmake --build --preset clang-x64-release --target _univ _autohdr --verbose

      - name: Set up Clang (x86)
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest
          platform: x86

      - name: Configure build for x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_x86

      - name: Configure CMake (x86)
        run: cmake --preset clang-x86

      - name: Build _univ and _autohdr (x86)
        run: cmake --build --preset clang-x86-release --target _univ _autohdr --verbose

      - name: Prepare release folder
        run: md githubrelease

      - name: Copy addons (x64)
        run: |
          copy build\release\renodx-_univ.addon64 githubrelease\
          copy build\release\renodx-_autohdr.addon64 githubrelease\

      - name: Copy addons (x86)
        run: |
          copy build32\release\renodx-_univ.addon32 githubrelease\
          copy build32\release\renodx-_autohdr.addon32 githubrelease\

      - name: Create Release (addons-univ-hdr)
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: addons-univ-hdr
          title: RenoDX _univ & _autohdr (HDR upgrade addons)
          files: githubrelease/*
          prerelease: false
